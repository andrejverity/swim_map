<!DOCTYPE html>
<html>
<head>
    <title>My Swim Tracker</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* 1. The Universal Selector - Sets the font for EVERYTHING */
        * { 
           font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
         }
        
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; background: #ffffff; }
        
        /* Popup Styling */
        .swim-popup { min-width: 200px; }
        .swim-popup h3 { margin: 0 0 5px 0; color: #1a1a1a; font-family: sans-serif; font-weight: 700; font-size: 1.2em; border-bottom: 2px solid #0077be; padding-bottom: 5px; }
        .swim-popup p { margin: 5px 0; font-size: 0.9em; color: #333; }
        .swim-popup b { color: #555; }
        
        /* The Photo Styling */
        .popup-photo { 
            width: 100%; 
            max-width: 250px; 
            margin-top: 10px; 
            border-radius: 5px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: block;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    const map = L.map('map').setView([0, 0], 2);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // REPLACE with your published CSV URL
    const swimSheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQB7vY6xEFq5mjiSUXvjWCnsZCzokSm1TwtCSZTpafc3SRoC-ZBwn0OU2lca6k1enO410um8uyFci9D/pub?output=csv";

    Papa.parse(swimSheetURL, {
        download: true,
        header: true,
        complete: function(results) {
            const points = [];
            
            results.data.forEach(row => {
                // Check for Latitude and Longitude (Case Sensitive!)
                if (row.Latitude && row.Longitude) {
                    const lat = parseFloat(row.Latitude);
                    const lng = parseFloat(row.Longitude);
                    const swimIcon = L.icon({
                        // FIXED: Added internal padding to prevent "clipping" on top and sides
                        iconUrl: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9Ii01IC01IDExMCAxMzAiIHdpZHRoPSIzMCIgaGVpZ2h0PSIzNiI+CiAgPHBhdGggZD0iTTUwLDAgQzIyLjQsMCAwLDIyLjQgMCw1MCBDMCw3Ny42IDIyLjQsMTAwIDUwLDEyMCBDNzcuNiwxMDAgMTAwLDc3LjYgMTAwLDUwIEMxMDAsMjIuNCA3Ny42LDAgNTAsMCBaIiBzdHJva2U9IiNiNTJjMWUiIHN0cm9rZS13aWR0aD0iOCIgZmlsbD0iIzAwMDAwMCIvPgogIDxwYXRoIGQ9Ik0yNSw1NSBRMzUsNDUgNTAsNTUgUTY1LDY1IDc1LDU1IiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iNSIgZmlsbD0ibm9uZSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+CiAgPHBhdGggZD0iTTMwLDcwIFFNDAsNjIgNTAsNzAgUTYwLDc4IDcwLDcwIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iNSIgZmlsbD0ibm9uZSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+Cjwvc3ZnPg==',
                        
                        // Increased display size slightly to compensate for the internal padding
                        iconSize: [32, 38], 
                        iconAnchor: [16, 38], // Anchored at bottom center
                        popupAnchor: [0, -38]
                    });
                    
                    // Create Marker
                    const marker = L.marker([lat, lng], { icon: swimIcon }).addTo(map);
                    
                    // Build Popup with your specific fields
                    let popupContent = `
                        <div class="swim-popup">
                            <h3>${row.Location}</h3>
                            <p><b>Date:</b> ${row.Date}</p>
                            <p><b>Watch:</b> ${row.Swim_Watch || row['Swim Watch']}</p>
                    `;

                    // Only add the image tag if a Photo URL exists
                    if (row.Photo && row.Photo.startsWith('http')) {
                        popupContent += `<img src="${row.Photo}" class="popup-photo" alt="Pool Photo">`;
                    }

                    popupContent += `</div>`;
                    
                    marker.bindPopup(popupContent);
                    points.push([lat, lng]);
                }
            });

            if (points.length > 0) {
                map.fitBounds(L.latLngBounds(points).pad(0.2));
            }
        }
    });
</script>
</body>
</html>
